# ========== 模型配置 ==========
# 对应 evalscope 的 config.yaml + eval_plan.yaml 整合

# --- 模型列表 ---
models:
  - name: DeepSeek-V3
    model_id: deepseek-v4-flash
    api_url: "https://api.deepseek.com/v1/chat/completions"
    api_key_env: DEEPSEEK_API_KEY
    description: DeepSeek V4 Flash，284B MoE，通用推理

  - name: DeepSeek-V4-Pro
    model_id: deepseek-v4-pro
    api_url: "https://api.deepseek.com/v1/chat/completions"
    api_key_env: DEEPSEEK_API_KEY
    description: DeepSeek V4 Pro，1.6T MoE，旗舰推理能力

  - name: Qwen-Plus
    model_id: qwen-plus
    api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
    api_key_env: BAILIAN_API_KEY
    description: 阿里通义千问增强版，多领域表现均衡

  - name: GLM-4-Plus
    model_id: glm-4-plus
    api_url: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
    api_key_env: ZHIPU_API_KEY
    description: 智谱 GLM 旗舰版，中英文双语能力强

  - name: Qwen2.5-VL
    model_id: qwen-vl-plus
    api_url: "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions"
    api_key_env: BAILIAN_API_KEY
    description: 阿里通义多模态视觉模型（纯文本评测不自动调用）
    active: false

# --- 数据集配置 ---
datasets:
  - name: gsm8k
    description: 小学数学推理（4-shot CoT）
    limit: 20
  - name: arc
    description: 科学常识选择（0-shot）
    limit: 20
  - name: hellaswag
    description: 句子补全/常识推理（0-shot）
    limit: 20

# --- 生成参数 ---
generation_config:
  temperature: 0.7
  max_tokens: 2048
  top_p: 0.95

# --- 评测参数 ---
eval_config:
  eval_type: openai_api
  eval_backend: Native
  eval_batch_size: 1
  timeout: 60
  seed: 42